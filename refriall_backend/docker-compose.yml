services:
  db:
    container_name: mariadb_refriall
    image: mariadb:11.8
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb:/var/lib/mysql:rw
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
    restart: always
  pma:
    depends_on:
      - db
    container_name: phpmyadmin_refriall
    image: phpmyadmin:5.2
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
    restart: always